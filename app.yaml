name: web-scrape-api
services:
  - name: api
    source_dir: /
    github:
      branch: main
      deploy_on_push: true
    environment_slug: python
    instance_count: 1
    instance_size_slug: basic-xxs
    http_port: 8080
    run_command: uvicorn main:app --host 0.0.0.0 --port ${PORT:-8080}
    build_command: >
      pip install -r requirements.txt &&
      python -m playwright install chromium
